version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stock-alert-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockalert}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockalert}
      POSTGRES_DB: ${POSTGRES_DB:-stockalert}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stockalert']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stock-alert-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-alert-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockalert}:${POSTGRES_PASSWORD:-stockalert}@postgres:5432/${POSTGRES_DB:-stockalert}
      REDIS_URL: redis://redis:6379
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
